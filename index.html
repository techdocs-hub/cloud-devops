<!DOCTYPE html>

<html lang="en">
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Cloud DevOps Portal</title>

<style>
body {
  margin: 0;
  font-family: Arial;
  background: #0f172a;
  color: white;
}

.header {
  background: #020617;
  padding: 14px 20px;
  font-weight: bold;
  border-bottom: 1px solid #1e293b;
}

.container {
  max-width: 400px;
  margin: 80px auto;
  text-align: center;
}

#display {
  font-size: 28px;
  letter-spacing: 10px;
  margin-bottom: 20px;
}

.keypad {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 10px;
}

button {
  padding: 18px;
  font-size: 18px;
  border: none;
  border-radius: 10px;
  background: #1e293b;
  color: white;
  cursor: pointer;
}

button:hover {
  background: #334155;
}

.home {
  display: none;
  text-align: center;
  margin-top: 80px;
}

.card {
  background: #1e293b;
  margin: 20px auto;
  padding: 25px;
  width: 260px;
  border-radius: 12px;
  cursor: pointer;
}

.card:hover {
  background: #334155;
}

/* IMAGE VIEWER */
#viewer {
  display: none;
  padding: 20px;
}

#image-container {
  max-width: 850px;
  margin: auto;
}

.page {
  margin-bottom: 25px;
  background: #1e293b;
  border-radius: 10px;
  min-height: 500px;
}

.page img {
  width: 100%;
}

/* PDF VIEWER */
#pdfViewer {
  display: none;
  height: 90vh;
}

iframe {
  width: 100%;
  height: 100%;
  border: none;
}

/* COMMON */
.page-number {
  text-align: center;
  color: #94a3b8;
  margin-bottom: 10px;
}

.back-btn {
  margin: 10px;
  cursor: pointer;
  color: #38bdf8;
}
</style>

</head>

<body>

<div class="header">Cloud DevOps Portal</div>

<!-- 🔐 LOCK -->

<div id="lock" class="container">
  <h2>Access Required</h2>
  <p style="color:#94a3b8;">Enter access code</p>

  <div id="display"></div>

  <div class="keypad">
    <button onclick="press(1)">1</button>
    <button onclick="press(2)">2</button>
    <button onclick="press(3)">3</button>
    <button onclick="press(4)">4</button>
    <button onclick="press(5)">5</button>
    <button onclick="press(6)">6</button>
    <button onclick="press(7)">7</button>
    <button onclick="press(8)">8</button>
    <button onclick="press(9)">9</button>
    <button onclick="back()">⌫</button>
    <button onclick="press(0)">0</button>
    <button onclick="check()">OK</button>
  </div>
</div>

<!-- 🏠 HOME -->

<div id="home" class="home">
  <div class="card" onclick="openCloud()">
    Cloud
  </div>

  <div class="card" onclick="openDevOps()">
    DevOps
  </div>
</div>

<!-- 📄 CLOUD IMAGE VIEWER -->

<div id="viewer">
  <div class="back-btn" onclick="goHome()">← Back</div>
  <div class="page-number" id="pageIndicator"></div>
  <div id="image-container"></div>
</div>

<!-- 📘 DEVOPS PDF VIEWER -->

<div id="pdfViewer">
  <div class="back-btn" onclick="goHome()">← Back</div>
  <iframe src="files/devops.pdf"></iframe>
</div>

<script>

// INPUT
let input = "";

// 🔐 OBFUSCATED PIN (2027)
function getCode() {
  const x = ["==w", "NyA", "jM"];
  const y = x.join("");
  const z = y.split("").reverse().join("");
  return atob(z);
}

// INPUT FUNCTIONS
function update() {
  document.getElementById("display").innerText = "•".repeat(input.length);
}

function press(n) {
  input += n;
  update();
}

function back() {
  input = input.slice(0, -1);
  update();
}

function check() {
  if (input === getCode()) {
    document.getElementById("lock").style.display = "none";
    document.getElementById("home").style.display = "block";
  } else {
    alert("Invalid code");
    input = "";
    update();
  }
}

// CLOUD
const totalPages = 862;

function openCloud() {
  document.getElementById("home").style.display = "none";
  document.getElementById("viewer").style.display = "block";
  document.getElementById("image-container").innerHTML = "";
  loadImages();
}

function loadImages() {
  const container = document.getElementById("image-container");

  for (let i = 1; i <= totalPages; i++) {
    const div = document.createElement("div");
    div.className = "page";
    div.dataset.page = i;
    container.appendChild(div);
  }

  const observer = new IntersectionObserver(entries => {
    entries.forEach(entry => {
      const page = entry.target;
      const num = parseInt(page.dataset.page);

      if (entry.isIntersecting) {
        loadPage(page, num);
        updateIndicator(num);
      } else {
        unloadPage(page);
      }
    });
  }, { rootMargin: "300px" });

  document.querySelectorAll(".page").forEach(p => observer.observe(p));
}

function loadPage(container, num) {
  if (container.querySelector("img")) return;

  const img = document.createElement("img");
  img.src = `images/cloud/page-${String(num).padStart(3,"0")}.jpg`;

  img.onerror = () => container.remove();

  container.innerHTML = "";
  container.appendChild(img);
}

function unloadPage(container) {
  const rect = container.getBoundingClientRect();
  if (rect.top > window.innerHeight * 2 || rect.bottom < -window.innerHeight * 2) {
    container.innerHTML = "";
  }
}

function updateIndicator(num) {
  document.getElementById("pageIndicator").innerText =
    "Page " + num + " / " + totalPages;
}

// DEVOPS
function openDevOps() {
  document.getElementById("home").style.display = "none";
  document.getElementById("pdfViewer").style.display = "block";
}

// BACK
function goHome() {
  document.getElementById("viewer").style.display = "none";
  document.getElementById("pdfViewer").style.display = "none";
  document.getElementById("home").style.display = "block";
}

</script>

</body>
</html>
