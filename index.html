<!DOCTYPE html>

<html lang="en">
<head>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Secure Viewer</title>
  <meta name="robots" content="noindex">

  <style>
    body {
      margin: 0;
      font-family: Arial;
      background: #0f172a;
      color: white;
      text-align: center;
    }

    .container {
      max-width: 400px;
      margin: 50px auto;
    }

    #display {
      font-size: 30px;
      letter-spacing: 10px;
      margin-bottom: 20px;
    }

    .keypad {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 10px;
    }

    button {
      padding: 20px;
      font-size: 18px;
      border: none;
      border-radius: 10px;
      background: #1e293b;
      color: white;
    }

    #viewer {
      display: none;
      padding: 20px;
    }

    #image-container {
      max-width: 800px;
      margin: auto;
    }

    .page {
      margin-bottom: 20px;
      background: #1e293b;
      border-radius: 8px;
      overflow: hidden;
      min-height: 500px;
    }

    .page img {
      width: 100%;
      display: block;
    }
  </style>

</head>

<body>

<!-- 🔐 LOCK SCREEN -->

<div class="container" id="lock">
  <h2>Enter Code</h2>
  <div id="display"></div>

  <div class="keypad">
    <button onclick="press(1)">1</button>
    <button onclick="press(2)">2</button>
    <button onclick="press(3)">3</button>
    <button onclick="press(4)">4</button>
    <button onclick="press(5)">5</button>
    <button onclick="press(6)">6</button>
    <button onclick="press(7)">7</button>
    <button onclick="press(8)">8</button>
    <button onclick="press(9)">9</button>
    <button onclick="back()">⌫</button>
    <button onclick="press(0)">0</button>
    <button onclick="check()">OK</button>
  </div>
</div>

<!-- 📄 VIEWER -->

<div id="viewer">
  <div id="image-container"></div>
</div>

<script>
  // 🔐 PIN LOGIC
  const correct = "1234"; // change this
  let input = "";

  function update() {
    document.getElementById("display").innerText = "•".repeat(input.length);
  }

  function press(n) {
    if (input.length < 6) {
      input += n;
      update();
    }
  }

  function back() {
    input = input.slice(0, -1);
    update();
  }

  function check() {
    if (input === correct) {
      unlock();
    } else {
      alert("Wrong code");
      input = "";
      update();
    }
  }

  function unlock() {
    document.getElementById("lock").style.display = "none";
    document.getElementById("viewer").style.display = "block";
    loadImages();
  }

  // 📄 LAZY LOADING VIEWER
  const totalPages = 862; // 🔥 CHANGE if needed

  function loadImages() {
    const container = document.getElementById("image-container");

    for (let i = 1; i <= totalPages; i++) {
      const div = document.createElement("div");
      div.className = "page";
      div.dataset.page = i;
      container.appendChild(div);
    }

    const observer = new IntersectionObserver((entries) => {
      entries.forEach(entry => {
        const page = entry.target;
        const pageNum = parseInt(page.dataset.page);

        if (entry.isIntersecting) {
          loadPage(page, pageNum);
        } else {
          unloadPage(page);
        }
      });
    }, {
      rootMargin: "1000px"
    });

    document.querySelectorAll(".page").forEach(p => observer.observe(p));
  }

  function loadPage(container, pageNum) {
    if (container.querySelector("img")) return;

    const img = document.createElement("img");
    img.src = `images/page-${String(pageNum).padStart(3, "0")}.jpg`;

    container.innerHTML = "";
    container.appendChild(img);
  }

  function unloadPage(container) {
    const rect = container.getBoundingClientRect();

    if (rect.top > window.innerHeight * 2 || rect.bottom < -window.innerHeight * 2) {
      container.innerHTML = "";
    }
  }
</script>

</body>
</html>
