<!DOCTYPE html>

<html lang="en">
<head>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Cloud DevOps Docs</title>

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #0f172a;
      color: white;
    }

    /* HEADER */
    .header {
      background: #020617;
      padding: 12px 20px;
      font-size: 18px;
      font-weight: bold;
      border-bottom: 1px solid #1e293b;
    }

    /* LOCK SCREEN */
    .container {
      max-width: 400px;
      margin: 80px auto;
      text-align: center;
    }

    #display {
      font-size: 28px;
      letter-spacing: 10px;
      margin-bottom: 20px;
    }

    .keypad {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 10px;
    }

    button {
      padding: 18px;
      font-size: 18px;
      border: none;
      border-radius: 10px;
      background: #1e293b;
      color: white;
      cursor: pointer;
    }

    button:hover {
      background: #334155;
    }

    /* VIEWER */
    #viewer {
      display: none;
      padding: 20px;
    }

    #image-container {
      max-width: 850px;
      margin: auto;
    }

    .page {
      margin-bottom: 25px;
      background: #1e293b;
      border-radius: 10px;
      overflow: hidden;
      min-height: 500px;
      position: relative;
    }

    .page img {
      width: 100%;
      display: block;
    }

    /* PAGE NUMBER */
    .page-number {
      position: sticky;
      top: 10px;
      text-align: center;
      font-size: 14px;
      color: #94a3b8;
      margin-bottom: 10px;
    }
  </style>

</head>

<body>

<div class="header">Cloud DevOps Documentation</div>

<!-- LOCK -->

<div class="container" id="lock">
  <h2>Access Required</h2>
  <p style="color:#94a3b8;font-size:14px;">Enter access code to continue</p>

  <div id="display"></div>

  <div class="keypad">
    <button onclick="press(1)">1</button>
    <button onclick="press(2)">2</button>
    <button onclick="press(3)">3</button>
    <button onclick="press(4)">4</button>
    <button onclick="press(5)">5</button>
    <button onclick="press(6)">6</button>
    <button onclick="press(7)">7</button>
    <button onclick="press(8)">8</button>
    <button onclick="press(9)">9</button>
    <button onclick="back()">⌫</button>
    <button onclick="press(0)">0</button>
    <button onclick="check()">OK</button>
  </div>
</div>

<!-- VIEWER -->

<div id="viewer">
  <div class="page-number" id="pageIndicator">Page 1</div>
  <div id="image-container"></div>
</div>

<script>
  const correct = "2027";
  let input = "";

  function update() {
    document.getElementById("display").innerText = "•".repeat(input.length);
  }

  function press(n) {
    if (input.length < 6) {
      input += n;
      update();
    }
  }

  function back() {
    input = input.slice(0, -1);
    update();
  }

  function check() {
    if (input === correct) {
      unlock();
    } else {
      alert("Invalid code");
      input = "";
      update();
    }
  }

  function unlock() {
    document.getElementById("lock").style.display = "none";
    document.getElementById("viewer").style.display = "block";
    loadImages();
  }

  const totalPages = 862;

  function loadImages() {
    const container = document.getElementById("image-container");

    for (let i = 1; i <= totalPages; i++) {
      const div = document.createElement("div");
      div.className = "page";
      div.dataset.page = i;
      container.appendChild(div);
    }

    const observer = new IntersectionObserver((entries) => {
      entries.forEach(entry => {
        const page = entry.target;
        const pageNum = parseInt(page.dataset.page);

        if (entry.isIntersecting) {
          loadPage(page, pageNum);
          updatePageIndicator(pageNum);
        } else {
          unloadPage(page);
        }
      });
    }, {
      rootMargin: "300px"
    });

    document.querySelectorAll(".page").forEach(p => observer.observe(p));
  }

  function loadPage(container, pageNum) {
    if (container.querySelector("img")) return;

    setTimeout(() => {
      const img = document.createElement("img");
      img.src = `images/page-${String(pageNum).padStart(3, "0")}.jpg`;

      img.onerror = function () {
        container.remove();
      };

      container.innerHTML = "";
      container.appendChild(img);
    }, 100);
  }

  function unloadPage(container) {
    const rect = container.getBoundingClientRect();

    if (rect.top > window.innerHeight * 2 || rect.bottom < -window.innerHeight * 2) {
      container.innerHTML = "";
    }
  }

  function updatePageIndicator(pageNum) {
    document.getElementById("pageIndicator").innerText = "Page " + pageNum + " / " + totalPages;
  }
</script>

</body>
</html>
